<!doctype html>
<html lang="en" class="overflow-x-hidden">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StudyMate" />
  <title>StudyMate</title>
  <!-- Inline theme to prevent FOUC -->
  <script>
    try{var t=localStorage.getItem('stitch-theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}
  </script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="//fonts.googleapis.com" rel="dns-prefetch" />
  <link href="//fonts.gstatic.com" rel="dns-prefetch" />
  <!-- Non-render-blocking font loading via media="print" swap trick -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&amp;family=Fredoka:wght@500;600&amp;display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&amp;family=Fredoka:wght@500;600&amp;display=swap"
    rel="stylesheet" /></noscript>
  <!-- Material Symbols: narrowed axis range (wght 400+700, FILL 0+1) and non-blocking -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,400;700,0..1&amp;display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,400;700,0..1&amp;display=swap"
    rel="stylesheet" /></noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
