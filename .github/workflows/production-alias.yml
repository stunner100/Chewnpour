name: Rotate chewnpour.com production alias

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-alias
  cancel-in-progress: false

jobs:
  rotate:
    name: Deploy production backend and point chewnpour.com at latest master deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stitch-app/package-lock.json

      - name: Install stitch-app dependencies
        working-directory: stitch-app
        run: npm ci

      - name: Deploy production Convex backend
        working-directory: stitch-app
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PRODUCTION }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "CONVEX_DEPLOY_KEY_PRODUCTION is not configured" >&2
            exit 1
          fi
          npx convex@1.36.0 deploy --typecheck disable --message "GitHub Actions production deploy ${GITHUB_SHA}"

      - name: Wait for Vercel production build of this commit
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for i in {1..90}; do
            RESPONSE=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&limit=30&target=production")
            DEPLOYMENT=$(echo "$RESPONSE" | jq -r --arg sha "$COMMIT_SHA" '
              .deployments
              | map(select(.meta.githubCommitSha == $sha and .state == "READY" and .target == "production" and .source == "git"))
              | sort_by(.created) | last
            ')
            if [ "$DEPLOYMENT" != "null" ] && [ -n "$DEPLOYMENT" ]; then
              URL=$(echo "$DEPLOYMENT" | jq -r .url)
              echo "DEPLOYMENT_URL=$URL" >> "$GITHUB_ENV"
              echo "Found READY production deployment for $COMMIT_SHA: https://$URL"
              exit 0
            fi
            echo "Attempt $i/90: no READY git-built production deployment yet for $COMMIT_SHA, sleeping 20s"
            sleep 20
          done
          echo "Timed out waiting for a READY git-built production deployment from $COMMIT_SHA" >&2
          exit 1

      - name: Assign chewnpour.com and www to the new deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          set -euo pipefail
          for DOMAIN in chewnpour.com www.chewnpour.com; do
            curl -fsS -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v2/deployments/$DEPLOYMENT_URL/aliases?teamId=$VERCEL_TEAM_ID" \
              -d "{\"alias\":\"$DOMAIN\"}"
            echo
            echo "$DOMAIN -> https://$DEPLOYMENT_URL"
          done
