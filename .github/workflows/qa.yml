name: QA

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: qa-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr
        shell: bash
        run: |
          echo "number=${{ github.event.pull_request.number || '' }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ github.head_ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install ImageMagick
        run: |
          sudo apt-get update -y
          sudo apt-get install -y -qq imagemagick

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install app-specific test prerequisites
        run: |
          python -m pip install --upgrade pip

      - name: Install droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run QA
        id: qa
        continue-on-error: true
        timeout-minutes: 20
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          CI: true
          QA_LEARNER_EMAIL: ${{ secrets.QA_LEARNER_EMAIL }}
          QA_PREMIUM_EMAIL: ${{ secrets.QA_PREMIUM_EMAIL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_DEFAULT_TEST_PASSWORD: ${{ secrets.QA_DEFAULT_TEST_PASSWORD }}
          QA_GOOGLE_TEST_EMAIL: ${{ secrets.QA_GOOGLE_TEST_EMAIL }}
          QA_GOOGLE_TEST_PASSWORD: ${{ secrets.QA_GOOGLE_TEST_PASSWORD }}
          QA_DOCLING_EXTRACT_URL: ${{ secrets.QA_DOCLING_EXTRACT_URL }}
          DOCLING_SHARED_SECRET: ${{ secrets.DOCLING_SHARED_SECRET }}
        run: |
          mkdir -p qa-results
          droid exec --auto high "
          You are running in a non-interactive CI environment. There is NO human available.
          Do NOT use AskUser, do NOT wait for confirmations, do NOT pause for input.
          Run the qa skill.
          Respect the local-dev-server strategy for stitch-app branch validation.
          Write the final report to qa-results/report.md.
          If failure learning finds actionable updates, write qa-results/skill-updates.json.
          " | tee qa-output.txt

      - name: Apply skill updates from QA
        id: apply-updates
        if: always() && steps.qa.outcome != 'cancelled'
        run: npx tsx apps/scripts/src/apply-qa-skill-updates/index.ts qa-results/skill-updates.json

      - name: Open PR with skill updates
        if: always() && steps.apply-updates.outcome == 'success' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet .factory/skills/; then exit 0; fi
          BRANCH="qa/catalog-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .factory/skills/
          git commit -m "chore(qa): update failure catalog from QA run #${{ github.run_number }}"
          git push origin "$BRANCH"
          gh pr create --base "${{ steps.pr.outputs.ref }}" --head "$BRANCH" \
            --title "chore(qa): update failure catalog from QA run #${{ github.run_number }}" \
            --body "Auto-generated from QA run on PR #${{ steps.pr.outputs.number }}." --draft

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ github.run_number }}
          path: |
            qa-results/**
            qa-output.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Post QA report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- qa-report -->';
            const reportPath = 'qa-results/report.md';
            const outputPath = 'qa-output.txt';
            let report = '';

            if (fs.existsSync(reportPath)) {
              report = fs.readFileSync(reportPath, 'utf8').trim();
            } else if (fs.existsSync(outputPath)) {
              const output = fs.readFileSync(outputPath, 'utf8').trim();
              report = `<details>\n<summary>QA output fallback</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>`;
            } else {
              report = 'QA run completed but no report file was produced.';
            }

            if (!report.startsWith('## QA Report')) {
              report = `## QA Report\n\n${report}`;
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const footer = `\n\n---\nArtifacts and logs: ${runUrl}\nWorkflow run: ${runUrl}`;
            const body = `${marker}\n${report.trim()}${footer}`;

            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => typeof comment.body === 'string' && comment.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Fail job if QA execution failed
        if: steps.qa.outcome == 'failure'
        run: exit 1
