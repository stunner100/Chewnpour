name: Rotate staging.chewnpour.com alias

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-alias
  cancel-in-progress: false

jobs:
  rotate:
    name: Point staging.chewnpour.com at latest staging deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for Vercel build of this commit
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for i in {1..60}; do
            RESPONSE=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&limit=30")
            DEPLOYMENT=$(echo "$RESPONSE" | jq -r --arg sha "$COMMIT_SHA" '
              .deployments
              | map(select(.meta.githubCommitSha == $sha and .state == "READY" and .target != "production"))
              | sort_by(.created) | last
            ')
            if [ "$DEPLOYMENT" != "null" ] && [ -n "$DEPLOYMENT" ]; then
              URL=$(echo "$DEPLOYMENT" | jq -r .url)
              echo "DEPLOYMENT_URL=$URL" >> "$GITHUB_ENV"
              echo "Found READY deployment for $COMMIT_SHA: https://$URL"
              exit 0
            fi
            echo "Attempt $i/60: no READY deployment yet for $COMMIT_SHA, sleeping 20s"
            sleep 20
          done
          echo "Timed out waiting for a READY deployment built from $COMMIT_SHA" >&2
          exit 1

      - name: Assign staging.chewnpour.com to the new deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v2/deployments/$DEPLOYMENT_URL/aliases?teamId=$VERCEL_TEAM_ID" \
            -d '{"alias":"staging.chewnpour.com"}'
          echo
          echo "staging.chewnpour.com -> https://$DEPLOYMENT_URL"
